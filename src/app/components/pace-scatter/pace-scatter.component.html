<div class="scatter-card">
  <div class="card-header">
    <div class="header-main">
      <h2 class="card-title">Distance vs Allure</h2>
      <div class="controls">
        <select
          class="select"
          [(ngModel)]="selectedActivityType"
          (ngModelChange)="onActivityTypeChange($event)">
          <option *ngFor="let type of activityTypes" [value]="type">
            {{ type }}
          </option>
        </select>

        <div class="zoom-controls">
          <button class="zoom-button" (click)="resetZoom()" aria-label="Reset zoom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 2v6h6"/>
              <path d="M3 13a9 9 0 1 0 3-7.7L3 8"/>
            </svg>
          </button>
          <button class="zoom-button zoom-step" (click)="zoomIn()" aria-label="Zoom +">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <button class="zoom-button zoom-step" (click)="zoomOut()" aria-label="Zoom -">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="chart-container" #chartContainer>
    <button
      class="fullscreen-button"
      (click)="toggleFullscreen()"
      [attr.aria-label]="(isFullscreen$ | async) ? 'Quitter le plein écran' : 'Passer en plein écran'"
    >
      <svg class="fullscreen-icon" viewBox="0 0 24 24">
        <path *ngIf="!(isFullscreen$ | async)"
              d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        <path *ngIf="isFullscreen$ | async"
              d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
      </svg>
    </button>
    <canvas id="paceScatterChart"></canvas>
  </div>
</div>
