<div class="login-container">
  <div class="login-card">
    <img src="assets/images/strava-logo.png" alt="Strava" class="strava-logo"/>
    <h1>{{ 'auth.login.title' | translate }}</h1>
    <p class="subtitle">{{ 'auth.login.description' | translate }}</p>

    <div class="privacy-notice">
      <div class="privacy-content">
        <div class="lock-container">
          <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <p>{{ 'auth.login.privacy' | translate }}</p>
      </div>
    </div>

    <button class="strava-button" (click)="login()">
      {{ 'auth.login.button' | translate }}
    </button>
  </div>
</div>
